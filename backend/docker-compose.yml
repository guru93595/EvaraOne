version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - DB_URL=postgres://postgres:password@timescaledb:5432/telemetry
    depends_on:
      - redis
      - mosquitto
      - timescaledb

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001" # WebSockets
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      # Requires a custom mosquitto.conf to allow anonymous auth for local dev
      # - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data

volumes:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  tsdb_data:
